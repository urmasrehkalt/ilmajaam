server {
    listen 80;
    listen [::]:80;
    server_name ilm.fsa.ee;

    root /var/www/ilm.fsa.ee;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|webp)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        access_log off;
    }
}
